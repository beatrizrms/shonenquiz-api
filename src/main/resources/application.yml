spring:
  application:
    name: api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://ep-super-hall-acc50ynv-pooler.sa-east-1.aws.neon.tech/neondb?sslmode=require&user}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      max-lifetime: 300000
      connection-timeout: 30000
      keepalive-time: 60000
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: true
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    open-in-view: false

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health
