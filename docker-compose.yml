services:
  api:
    build:
      context: .
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DATABASE_URL: jdbc:postgresql://postgres:5432/shonenquiz
      DATABASE_USERNAME: shonenquiz
      DATABASE_PASSWORD: shonenquiz
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: shonenquiz
      POSTGRES_USER: shonenquiz
      POSTGRES_PASSWORD: shonenquiz
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shonenquiz -d shonenquiz"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
